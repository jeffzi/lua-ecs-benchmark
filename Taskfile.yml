version: 3

silent: true

vars:
  OUT_DIR: results
  JIT: "on" # JIT status for LuaJIT (set to "off" to disable JIT)

tasks:
  default:
    cmds:
      - task: benchmark
      - task: export

  init-submodules:
    internal: true
    desc: Init git submodules for framework dependencies.
    cmds:
      - git submodule update --init

  install-lua-deps:
    internal: true
    desc: Install Lua dependencies.
    status:
      - luarocks show allocspy
      - luarocks show argparse
      - luarocks show chronos
      - luarocks show lovetoys
      - luarocks show luamark
      - luarocks show tiny-ecs
      - luarocks show terminal
    cmds:
      - luarocks install https://raw.githubusercontent.com/siffiejoe/lua-allocspy/refs/heads/master/allocspy-scm-0.rockspec
      - luarocks install argparse
      - luarocks install chronos
      - luarocks install lovetoys
      - luarocks install luamark
      - luarocks install tiny-ecs
      - luarocks install https://raw.githubusercontent.com/lunarmodules/terminal.lua/refs/heads/main/terminal-scm-1.rockspec
    preconditions:
      - sh: luarocks --version
        msg: luarocks not found in PATH.

  install-prek:
    internal: true
    desc: Install prek and pre-commit hooks.
    status:
      - prek --version
    cmds:
      - uv tool install prek
      - prek install
    preconditions:
      - sh: uv --version
        msg: "uv not found in PATH. See https://docs.astral.sh/uv/getting-started/installation/"

  install-py-deps:
    internal: true
    desc: Install Python dependencies.
    deps:
      - install-prek
    cmds:
      - uv sync --quiet
    preconditions:
      - sh: uv --version
        msg: "uv not found in PATH. See https://docs.astral.sh/uv/getting-started/installation/"

  benchmark:
    desc: Benchmark with the current Lua interpreter. Use JIT=off to disable JIT (e.g., task benchmark JIT=off).
    deps:
      - init-submodules
      - install-lua-deps
    vars:
      LUA_INTERPRETER:
        sh: lua -e "if jit then print('luajit-{{.JIT}}') else print('lua'.._VERSION:match('%d+%.%d+')) end"
      JIT_FLAG:
        sh: lua -e "if jit and '{{.JIT}}'=='off' then print('-joff') end"
    cmds:
      - lua {{.JIT_FLAG}} src/main.lua -o "{{.OUT_DIR}}/{{.LUA_INTERPRETER}}/results.csv" {{.CLI_ARGS}}

  export:
    desc: Export plots and markdown.
    deps:
      - install-py-deps
    cmds:
      - uv run scripts/export.py {{.OUT_DIR}}

  update-submodules:
    desc: Update submodules to latest commits. Use -- -t to force show README table.
    cmds:
      - git submodule update --init --remote
      - git add lib/
      - lua scripts/submodules.lua {{.CLI_ARGS}}
