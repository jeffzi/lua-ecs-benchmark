version: 3

silent: true

vars:
  OUT_DIR: results
  CSV: results.csv
  BENCHMARK_PATH: "{{joinPath .OUT_DIR .CSV}}"

tasks:
  default:
    internal: true
    cmds:
      - task: all

  all:
    desc: Benchmark all frameworks and export the plots.
    cmds:
      - task: benchmark
      - task: export

  init-submodules:
    internal: true
    desc: Init git submodules for framework dependencies.
    cmds:
      - git submodule update --init

  install-deps:
    internal: true
    desc: Install Lua dependencies.
    cmds:
      - luarocks list --porcelain argparse | grep -q "installed" || luarocks install argparse
      - luarocks list --porcelain chronos | grep -q "installed" || luarocks install chronos
      - luarocks list --porcelain lovetoys | grep -q "installed" || luarocks install lovetoys
      - luarocks list --porcelain luamark | grep -q "installed" || luarocks install luamark
      - luarocks list --porcelain tiny-ecs | grep -q "installed" || luarocks install tiny-ecs
    preconditions:
      - sh: luarocks --version
        msg: luarocks not found in PATH.

  benchmark:
    desc: Benchmark all frameworks.
    deps:
      - init-submodules
      - install-deps
    cmds:
      - echo "Running Benchmarks"
      - lua src/main.lua -o "{{.BENCHMARK_PATH}}" {{.CLI_ARGS}}

  install-py-deps:
    internal: true
    desc: Install Python dependencies.
    cmds:
      - uv sync --quiet
    preconditions:
      - sh: uv --version
        msg: "uv not found in PATH. See https://docs.astral.sh/uv/getting-started/installation/"

  export:
    desc: Export plots and markdown.
    deps:
      - install-py-deps
    cmds:
      - echo "Exporting Results"
      - uv run scripts/export.py {{.BENCHMARK_PATH}} {{.OUT_DIR}}

  update-submodules:
    desc: Update submodules to latest commits and refresh README.
    cmds:
      - git submodule update --init --remote
      - git add lib/
      - |
        echo ""
        echo "Update README.md with:"
        echo ""
        echo "| Library | Commit |"
        echo "|---------|--------|"
        for dir in lib/*/; do
          name=$(basename "$dir")
          sha=$(git -C "$dir" rev-parse HEAD)
          short=$(git -C "$dir" rev-parse --short HEAD)
          url=$(git config --file .gitmodules --get "submodule.${dir%/}.url" | sed 's/\.git$//')
          echo "| [$name]($url) | [\`$short\`]($url/tree/$sha) |"
        done
